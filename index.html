<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI MCQ Generator</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:1200px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:25px;
    }

    .card{
      background:#1e293b;
      border-radius:20px;
      padding:25px;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    h1{
      font-size:28px;
      margin-bottom:10px;
      color:#38bdf8;
    }

    p{
      color:#cbd5e1;
      margin-bottom:20px;
    }

    video, canvas, img{
      width:100%;
      border-radius:15px;
      background:black;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#38bdf8;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      margin-top:15px;
      transition:0.3s;
    }

    button:hover{
      background:#0ea5e9;
    }

    .mcq-box{
      margin-top:20px;
    }

    .mcq{
      background:#334155;
      padding:15px;
      border-radius:12px;
      margin-bottom:15px;
    }

    .mcq h3{
      margin-bottom:10px;
      color:#f8fafc;
    }

    .option{
      background:#475569;
      padding:10px;
      border-radius:8px;
      margin:6px 0;
      color:#e2e8f0;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:15px;
    }

    .badge{
      background:#22c55e;
      padding:6px 12px;
      border-radius:20px;
      font-size:13px;
    }

    @media(max-width:900px){
      .container{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LEFT SIDE -->
    <div class="card">

      <div class="top">
        <h1>AI MCQ Generator</h1>
        <span class="badge">Student Tool</span>
      </div>

      <p>
        Open camera and capture book/page photo.
        AI will generate MCQs automatically.
      </p>

      <video id="video" autoplay playsinline></video>

      <button onclick="startCamera()">Open Camera</button>
      <button onclick="capturePhoto()">Capture Page</button>

      <canvas id="canvas" style="display:none;"></canvas>

      <img id="preview" />

    </div>

    <!-- RIGHT SIDE -->
    <div class="card">

      <div class="top">
        <h1>Generated MCQs</h1>
        <span class="badge">AI Ready</span>
      </div>

      <p>
        MCQs will appear here after scanning.
      </p>

      <button onclick="generateMCQs()">
        Generate MCQs
      </button>

      <div class="mcq-box" id="mcqBox">

      </div>

    </div>

  </div>

  <script>

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const preview = document.getElementById('preview');
    const mcqBox = document.getElementById('mcqBox');

    async function startCamera(){

      try{
        const stream = await navigator.mediaDevices.getUserMedia({
          video:true
        });

        video.srcObject = stream;

      }catch(err){
        alert("Camera access denied.");
      }

    }

    function capturePhoto(){

      const context = canvas.getContext('2d');

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      context.drawImage(video,0,0);

      const imageData = canvas.toDataURL("image/png");

      preview.src = imageData;

    }

    function generateMCQs(){

      mcqBox.innerHTML = `

        <div class="mcq">
          <h3>1. What is HTML?</h3>

          <div class="option">A. Programming Language</div>
          <div class="option">B. Markup Language</div>
          <div class="option">C. Database</div>
          <div class="option">D. Operating System</div>
        </div>

        <div class="mcq">
          <h3>2. Which tag is used for image?</h3>

          <div class="option">A. img</div>
          <div class="option">B. image</div>
          <div class="option">C. src</div>
          <div class="option">D. picture</div>
        </div>

        <div class="mcq">
          <h3>3. CSS is used for?</h3>

          <div class="option">A. Styling</div>
          <div class="option">B. Database</div>
          <div class="option">C. Server</div>
          <div class="option">D. AI Training</div>
        </div>

      `;

    }

  </script>

</body>
  </html>
